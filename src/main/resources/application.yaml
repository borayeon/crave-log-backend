# ==========================================
# 1. 공통 설정 (모든 환경 공통)
# ==========================================
spring:
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            client-name: Kakao

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  # ⭐️ 메일 발송 (Google SMTP) 설정 추가
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ⭐️ Redis 연동 설정 추가
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
jwt:
  secret: ${JWT_SECRET}
  expiration: 7200000

server:
  port: ${PORT:8080}

---
# ==========================================
# 2. 로컬(Local) 환경 설정
# ==========================================
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:mysql://localhost:3306/crave_log?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  auth:
    # ⭐️ 원래대로 복구
    authorized-redirect-uris: http://localhost:5173/oauth2/redirect
    allowed-origins: http://localhost:5173

---
# ==========================================
# 3. 배포(Prod) 환경 설정
# ==========================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

app:
  auth:
    # ⭐️ 원래대로 복구
    authorized-redirect-uris: ${FRONTEND_URL}
    allowed-origins: ${FRONTEND_URL}